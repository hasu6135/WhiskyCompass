<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商品詳細 - WhiskyCompass</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .product {max-width:900px;margin:40px auto;padding:24px;background:#fff;border-radius:8px}
    .product-hero{display:flex;gap:24px}
    .product-image{width:320px;height:320px;background:#f3f3f3;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#999}
    .product-meta h1{font-size:26px;margin:0 0 8px}
    .price{font-weight:700;color:var(--amber);font-size:20px;margin:8px 0}
    .tags span{display:inline-block;background:#f1efe9;padding:6px 8px;border-radius:6px;margin-right:8px;font-size:13px}
    .buy-links a{display:inline-block;margin-right:10px;padding:10px 14px;border-radius:6px;text-decoration:none;background:#17382e;color:#fff}
    .back-link{display:inline-block;margin-bottom:12px;color:var(--ink);text-decoration:none}
  </style>
</head>
<body>
  <main class="product">
    <a class="back-link" href="index.html">← 戻る</a>
    <div id="productContent">
      <p>読み込み中…</p>
    </div>
  </main>

  <script src="data/whiskies.js"></script>
  <script src="product.js"></script>
</body>
</html>
